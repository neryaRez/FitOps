name: Frontend Deploy

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-deploy.yml"

permissions:
  id-token: write
  contents: read

concurrency:
  group: frontend-deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy frontend to S3 and CloudFront
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required GitHub variables
        working-directory: .
        shell: bash
        run: |
          set -euo pipefail

          missing=0

          check_var() {
            local name="$1"
            local value="$2"

            if [[ -z "$value" ]]; then
              echo "❌ Missing GitHub repository variable: $name"
              missing=1
            else
              echo "✅ $name is configured"
            fi
          }

          check_var "AWS_REGION" "${{ vars.AWS_REGION }}"
          check_var "AWS_FRONTEND_DEPLOY_ROLE_ARN" "${{ vars.AWS_FRONTEND_DEPLOY_ROLE_ARN }}"
          check_var "FRONTEND_BUCKET" "${{ vars.FRONTEND_BUCKET }}"
          check_var "CLOUDFRONT_DISTRIBUTION_ID" "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}"

          if [[ "$missing" -ne 0 ]]; then
            echo "Required GitHub repository variables are missing."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Verify build output
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -f dist/index.html ]]; then
            echo "❌ dist/index.html was not created."
            exit 1
          fi

          if [[ ! -d dist/assets ]]; then
            echo "❌ dist/assets directory was not created."
            exit 1
          fi

          echo "✅ Frontend build output verified."

      - name: Configure AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_FRONTEND_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Verify AWS identity
        shell: bash
        run: |
          set -euo pipefail
          aws sts get-caller-identity

      - name: Upload immutable static assets to S3
        shell: bash
        run: |
          set -euo pipefail

          aws s3 sync dist/ "s3://${{ vars.FRONTEND_BUCKET }}" \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload index.html with no-cache
        shell: bash
        run: |
          set -euo pipefail

          aws s3 cp dist/index.html "s3://${{ vars.FRONTEND_BUCKET }}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache
        working-directory: .
        shell: bash
        run: |
          set -euo pipefail

          INVALIDATION_ID="$(
            aws cloudfront create-invalidation \
              --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
              --paths "/*" \
              --query "Invalidation.Id" \
              --output text
          )"

          echo "Created CloudFront invalidation: $INVALIDATION_ID"

          aws cloudfront wait invalidation-completed \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --id "$INVALIDATION_ID"

          echo "✅ CloudFront invalidation completed."

      - name: Smoke test CloudFront
        working-directory: .
        shell: bash
        run: |
          set -euo pipefail

          DOMAIN="$(
            aws cloudfront get-distribution \
              --id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
              --query "Distribution.DomainName" \
              --output text
          )"

          URL="https://$DOMAIN"

          echo "Testing frontend URL: $URL"

          for i in {1..12}; do
            STATUS_CODE="$(curl -L -s -o /tmp/frontend.html -w "%{http_code}" "$URL" || true)"

            if [[ "$STATUS_CODE" == "200" ]] && grep -qi "<html" /tmp/frontend.html; then
              echo "✅ Frontend is live: $URL"
              exit 0
            fi

            echo "Attempt $i/12 failed. Status: $STATUS_CODE. Waiting..."
            sleep 10
          done

          echo "❌ Frontend smoke test failed."
          echo "Last status code: $STATUS_CODE"
          head -50 /tmp/frontend.html || true
          exit 1