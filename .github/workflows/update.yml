name: Update Dev

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

concurrency:
  group: fitops-dev-update
  cancel-in-progress: false

jobs:
  update-dev:
    name: Update dev by changed area
    runs-on: ubuntu-latest
    timeout-minutes: 45

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed areas
        id: changes
        run: |
          set -euo pipefail

          FRONTEND_CHANGED=false
          BACKEND_CHANGED=false
          TERRAFORM_CHANGED=false

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [[ -z "$BEFORE" || "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            CHANGED_FILES="$(git diff --name-only HEAD~1 HEAD || true)"
          else
            CHANGED_FILES="$(git diff --name-only "$BEFORE" "$AFTER" || true)"
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue

            case "$file" in
              frontend/*|frontend/**)
                FRONTEND_CHANGED=true
                ;;

              backend/functions/*|backend/functions/**)
                BACKEND_CHANGED=true
                ;;

              infra/terraform/*|infra/terraform/**)
                TERRAFORM_CHANGED=true
                ;;
            esac
          done <<< "$CHANGED_FILES"

          echo "frontend_changed=$FRONTEND_CHANGED" >> "$GITHUB_OUTPUT"
          echo "backend_changed=$BACKEND_CHANGED" >> "$GITHUB_OUTPUT"
          echo "terraform_changed=$TERRAFORM_CHANGED" >> "$GITHUB_OUTPUT"

          echo "frontend_changed=$FRONTEND_CHANGED"
          echo "backend_changed=$BACKEND_CHANGED"
          echo "terraform_changed=$TERRAFORM_CHANGED"

          if [[ "$FRONTEND_CHANGED" != "true" && "$BACKEND_CHANGED" != "true" && "$TERRAFORM_CHANGED" != "true" ]]; then
            echo "No relevant app/infra changes detected. Nothing to deploy."
          fi

      - name: Stop if no relevant changes
        if: steps.changes.outputs.frontend_changed != 'true' && steps.changes.outputs.backend_changed != 'true' && steps.changes.outputs.terraform_changed != 'true'
        run: |
          echo "No frontend/backend/terraform changes. Skipping."
          exit 0

      - name: Validate required GitHub variables
        if: steps.changes.outputs.frontend_changed == 'true' || steps.changes.outputs.backend_changed == 'true' || steps.changes.outputs.terraform_changed == 'true'
        run: |
          set -euo pipefail

          missing=0

          check_var() {
            local name="$1"
            local value="$2"

            if [[ -z "$value" ]]; then
              echo "❌ Missing GitHub repository variable: $name"
              missing=1
            else
              echo "✅ $name is configured"
            fi
          }

          check_var "AWS_REGION" "${{ vars.AWS_REGION }}"
          check_var "AWS_GITHUB_ACTIONS_ROLE_ARN" "${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}"
          check_var "TF_STATE_BUCKET" "${{ vars.TF_STATE_BUCKET }}"
          check_var "TF_STATE_LOCK_TABLE" "${{ vars.TF_STATE_LOCK_TABLE }}"
          check_var "TF_DEV_STATE_KEY" "${{ vars.TF_DEV_STATE_KEY }}"
          check_var "PROJECT_NAME" "${{ vars.PROJECT_NAME }}"
          check_var "ENVIRONMENT" "${{ vars.ENVIRONMENT }}"

          if [[ "$missing" -ne 0 ]]; then
            echo "Run ./scripts/bootstrap-aws.sh first."
            exit 1
          fi

      - name: Configure AWS credentials through OIDC
        if: steps.changes.outputs.frontend_changed == 'true' || steps.changes.outputs.backend_changed == 'true' || steps.changes.outputs.terraform_changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Verify AWS identity
        if: steps.changes.outputs.frontend_changed == 'true' || steps.changes.outputs.backend_changed == 'true' || steps.changes.outputs.terraform_changed == 'true'
        run: aws sts get-caller-identity

      - name: Setup Terraform
        if: steps.changes.outputs.frontend_changed == 'true' || steps.changes.outputs.backend_changed == 'true' || steps.changes.outputs.terraform_changed == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.5
          terraform_wrapper: false

      - name: Generate Terraform backend and tfvars
        if: steps.changes.outputs.frontend_changed == 'true' || steps.changes.outputs.backend_changed == 'true' || steps.changes.outputs.terraform_changed == 'true'
        working-directory: infra/terraform/environments/dev
        run: |
          set -euo pipefail

          cat > backend.tf <<BACKEND
          terraform {
            backend "s3" {
              bucket         = "${{ vars.TF_STATE_BUCKET }}"
              key            = "${{ vars.TF_DEV_STATE_KEY }}"
              region         = "${{ vars.AWS_REGION }}"
              dynamodb_table = "${{ vars.TF_STATE_LOCK_TABLE }}"
              encrypt        = true
            }
          }
          BACKEND

          cat > terraform.tfvars <<TFVARS
          project_name = "${{ vars.PROJECT_NAME }}"
          environment  = "${{ vars.ENVIRONMENT }}"
          aws_region   = "${{ vars.AWS_REGION }}"
          TFVARS

      - name: Terraform init
        if: steps.changes.outputs.frontend_changed == 'true' || steps.changes.outputs.backend_changed == 'true' || steps.changes.outputs.terraform_changed == 'true'
        working-directory: infra/terraform/environments/dev
        run: terraform init

      - name: Terraform fmt check
        if: steps.changes.outputs.terraform_changed == 'true'
        working-directory: infra/terraform/environments/dev
        run: terraform fmt -check -recursive ../../

      - name: Terraform validate
        if: steps.changes.outputs.backend_changed == 'true' || steps.changes.outputs.terraform_changed == 'true'
        working-directory: infra/terraform/environments/dev
        run: terraform validate

      - name: Terraform plan
        if: steps.changes.outputs.backend_changed == 'true' || steps.changes.outputs.terraform_changed == 'true'
        working-directory: infra/terraform/environments/dev
        run: terraform plan

      - name: Terraform apply backend or infra changes
        if: steps.changes.outputs.backend_changed == 'true' || steps.changes.outputs.terraform_changed == 'true'
        working-directory: infra/terraform/environments/dev
        run: terraform apply -auto-approve

      - name: Export Terraform outputs for frontend/API checks
        if: steps.changes.outputs.frontend_changed == 'true' || steps.changes.outputs.backend_changed == 'true' || steps.changes.outputs.terraform_changed == 'true'
        working-directory: infra/terraform/environments/dev
        run: |
          set -euo pipefail

          {
            echo "VITE_API_BASE_URL=$(terraform output -raw api_endpoint)"
            echo "FRONTEND_BUCKET=$(terraform output -raw static_site_bucket_name)"
            echo "CLOUDFRONT_DISTRIBUTION_ID=$(terraform output -raw cloudfront_distribution_id)"
            echo "CLOUDFRONT_DOMAIN=$(terraform output -raw cloudfront_domain_name)"

            echo "VITE_COGNITO_REGION=${{ vars.AWS_REGION }}"
            echo "VITE_COGNITO_USER_POOL_ID=$(terraform output -raw cognito_user_pool_id)"
            echo "VITE_COGNITO_APP_CLIENT_ID=$(terraform output -raw cognito_app_client_id)"
            echo "VITE_COGNITO_HOSTED_UI_BASE_URL=$(terraform output -raw cognito_hosted_ui_base_url)"
            echo "VITE_COGNITO_REDIRECT_URI=$(terraform output -raw cognito_callback_url)"
            echo "VITE_COGNITO_LOGOUT_URI=$(terraform output -raw cognito_logout_url)"
          } >> "$GITHUB_ENV"

      - name: Setup Node.js
        if: steps.changes.outputs.frontend_changed == 'true' || steps.changes.outputs.terraform_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: steps.changes.outputs.frontend_changed == 'true' || steps.changes.outputs.terraform_changed == 'true'
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        if: steps.changes.outputs.frontend_changed == 'true' || steps.changes.outputs.terraform_changed == 'true'
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ env.VITE_API_BASE_URL }}
          VITE_COGNITO_REGION: ${{ env.VITE_COGNITO_REGION }}
          VITE_COGNITO_USER_POOL_ID: ${{ env.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_APP_CLIENT_ID: ${{ env.VITE_COGNITO_APP_CLIENT_ID }}
          VITE_COGNITO_HOSTED_UI_BASE_URL: ${{ env.VITE_COGNITO_HOSTED_UI_BASE_URL }}
          VITE_COGNITO_REDIRECT_URI: ${{ env.VITE_COGNITO_REDIRECT_URI }}
          VITE_COGNITO_LOGOUT_URI: ${{ env.VITE_COGNITO_LOGOUT_URI }}
        run: npm run build

      - name: Verify frontend build output
        if: steps.changes.outputs.frontend_changed == 'true' || steps.changes.outputs.terraform_changed == 'true'
        working-directory: frontend
        run: |
          set -euo pipefail
          test -f dist/index.html
          test -d dist/assets

      - name: Upload frontend to S3
        if: steps.changes.outputs.frontend_changed == 'true' || steps.changes.outputs.terraform_changed == 'true'
        working-directory: frontend
        run: |
          set -euo pipefail

          aws s3 sync dist/ "s3://${FRONTEND_BUCKET}" \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

          aws s3 cp dist/index.html "s3://${FRONTEND_BUCKET}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache
        if: steps.changes.outputs.frontend_changed == 'true' || steps.changes.outputs.terraform_changed == 'true'
        run: |
          set -euo pipefail

          INVALIDATION_ID="$(
            aws cloudfront create-invalidation \
              --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
              --paths "/*" \
              --query "Invalidation.Id" \
              --output text
          )"

          aws cloudfront wait invalidation-completed \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --id "$INVALIDATION_ID"

      - name: Smoke test frontend
        if: steps.changes.outputs.frontend_changed == 'true' || steps.changes.outputs.terraform_changed == 'true'
        run: |
          set -euo pipefail

          URL="https://${CLOUDFRONT_DOMAIN}"

          for i in {1..12}; do
            STATUS_CODE="$(curl -L -s -o /tmp/frontend.html -w "%{http_code}" "$URL" || true)"

            if [[ "$STATUS_CODE" == "200" ]] && grep -qi "<html" /tmp/frontend.html; then
              echo "✅ Frontend is live: $URL"
              exit 0
            fi

            echo "Attempt $i/12 failed. Status: $STATUS_CODE"
            sleep 10
          done

          echo "❌ Frontend smoke test failed"
          exit 1

      - name: Smoke test API health
        if: steps.changes.outputs.backend_changed == 'true' || steps.changes.outputs.terraform_changed == 'true'
        run: |
          set -euo pipefail

          curl -fsS "${VITE_API_BASE_URL}/health"

          echo
          echo "✅ API health check passed"