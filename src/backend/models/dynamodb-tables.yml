# backend/models/dynamodb-tables.yml
# DynamoDB table definitions — mirrors the Base44 entities in entities/
# Use these in serverless.yml under resources.Resources or with aws-cli / CDK.

Resources:

  UserProfilesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: fitops-user-profiles
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  WeightLogsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: fitops-weight-logs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: date
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: date
          KeyType: RANGE

  MeasurementLogsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: fitops-measurement-logs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: date
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: date
          KeyType: RANGE

  ProgressPhotosTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: fitops-progress-photos
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: id
          KeyType: RANGE

  AIRecommendationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: fitops-ai-recommendations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  ProgressPhotosBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: fitops-progress-photos
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT, POST]
            AllowedOrigins: ['*']